name: gRPC Sync

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  grpc-sync:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-run-commands.yml@01e2b12e992621fecf074b8a202f66044196f3bf
    with:
      working-directory: "."
      skip-if-glob-empty: |-
        **/*.proto
        **/*_pb.go
        **/*.pb.go
      commands: |-
        set -euo pipefail
        echo "Proto/gRPC files detected. Add a generation check script to enforce sync."
