name: gRPC Sync

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '**'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  grpc-sync:
    permissions:
      contents: read
    uses: ffreis-org/ffreis-workflows-general/.github/workflows/general-run-commands.yml@5dfbb4986ceb88f6518fa719da3a255294cf03cf
    with:
      working-directory: "."
      skip-if-glob-empty: |-
        **/*.proto
        **/*_pb.go
        **/*.pb.go
      commands: |-
        set -euo pipefail
        echo "Proto/gRPC files detected. Add a generation check script to enforce sync."
