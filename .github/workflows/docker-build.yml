name: Docker Build

on:
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'containers/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/docker-build.yml'
  push:
    branches: [main, master]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'containers/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/docker-build.yml'

permissions:
  contents: read
  packages: write

jobs:
  docker:
    permissions:
      contents: read
      packages: write
    uses: FelipeFuhr/ffreis-workflows-container/.github/workflows/container-build.yml@f75a40f7a44cade2b00a8843f75b3f86dfe80a0e
    with:
      image: "website-compiler-cli"
      containerfile: "containers/Dockerfile.cli"
      context: "."
      skip-if-missing: true
      push: false
      build-args: |-
        BUILDER_IMAGE=${{ vars.WEBSITE_COMPILER_BUILDER_IMAGE || 'golang:1.25.8-bookworm' }}
        RUNTIME_IMAGE=${{ vars.WEBSITE_COMPILER_RUNTIME_IMAGE || 'debian:bookworm-slim' }}
    secrets: inherit
