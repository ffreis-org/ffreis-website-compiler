name: Docker Build

on:
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'containers/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/docker-build.yml'
  push:
    branches: [main, master]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'containers/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/docker-build.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    permissions:
      contents: read
      packages: write
    uses: FelipeFuhr/ffreis-workflows-container/.github/workflows/container-build.yml@9de70bedfbb3de1cb0dfb5a4943b44c9fcf81042
    with:
      image: "website-compiler-cli"
      containerfile: "containers/Dockerfile.cli"
      context: "."
      skip-if-missing: true
      push: false
      build-args: |-
        BUILDER_IMAGE=${{ vars.WEBSITE_COMPILER_BUILDER_IMAGE || 'golang:1.25.8-bookworm' }}
        RUNTIME_IMAGE=${{ vars.WEBSITE_COMPILER_RUNTIME_IMAGE || 'debian:bookworm-slim' }}
    secrets: inherit
