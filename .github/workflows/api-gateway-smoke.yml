name: API Gateway Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '36 21 8 * *'  # monthly scattered (was: 15 4 * * *)

jobs:
  smoke:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-http-smoke.yml@5dfbb4986ceb88f6518fa719da3a255294cf03cf
    with:
      paths: |-
        /
        /index.html
    secrets:
      SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
