name: Monthly Fuzz

on:
  schedule:
    - cron: '7 1 22 * *'  # monthly scattered (was: 0 2 1 * *)
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual run (optional)"
        required: false
        type: string
jobs:
  fuzz:
    permissions:
      contents: read
    uses: ffreis-org/ffreis-workflows-go/.github/workflows/go-fuzz.yml@d9b0146bb491bf06a79c9c6289034537522cbed3
    with:
      go-version: "1.25.8"
      working-directory: "."
      packages: "./internal/sitemap ./internal/sitegen"
      fuzz-targets: "Fuzz"
      fuzz-time: "20s"

  notify-failure:
    needs: [fuzz]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ [CI] ${context.workflow} failed (${new Date().toISOString().split('T')[0]})`,
              body: [
                `**Workflow:** ${context.workflow}`,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join('\n'),
            });
