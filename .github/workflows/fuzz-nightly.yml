name: Nightly Fuzz

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  fuzz:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-fuzz.yml@e9b9cc0cde6465b785f4b7c71d2180f5b265f42f
    with:
      go-version: "1.25.8"
      working-directory: "."
      packages: "./internal/sitemap ./internal/sitegen"
      fuzz-targets: "Fuzz"
      fuzz-time: "20s"
