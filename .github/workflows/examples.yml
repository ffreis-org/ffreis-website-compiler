name: Examples

on:
  pull_request:
    paths:
      - '**'
      - 'examples/**'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  examples:
    timeout-minutes: 30
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-run-commands.yml@01e2b12e992621fecf074b8a202f66044196f3bf
    with:
      working-directory: "."
      setup-go: true
      go-version: "1.25.8"
      timeout-minutes: 15
      commands: |-
        set -euo pipefail
        go run ./cmd/build-static -website-root ./examples/hello-world -out /tmp/example-default
        go run ./cmd/build-static \
          -website-root ./examples/hello-world \
          -templates-dir ./examples/hello-world/src/templates \
          -assets-dir ./examples/hello-world/src/assets \
          -out /tmp/example-explicit
