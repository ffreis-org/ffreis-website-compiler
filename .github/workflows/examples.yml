name: Examples

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '**'
      - 'examples/**'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  examples:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-run-commands.yml@5dfbb4986ceb88f6518fa719da3a255294cf03cf
    with:
      working-directory: "."
      setup-go: true
      go-version: "1.25.8"
      timeout-minutes: 15
      commands: |-
        set -euo pipefail
        go run ./cmd/build-static -website-root ./examples/hello-world -out /tmp/example-default
        go run ./cmd/build-static \
          -website-root ./examples/hello-world \
          -templates-dir ./examples/hello-world/src/templates \
          -assets-dir ./examples/hello-world/src/assets \
          -out /tmp/example-explicit
