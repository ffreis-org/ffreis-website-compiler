name: E2E Build Smoke

on:
  pull_request:
    paths:
      - '**'
      - 'examples/**'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - '**'
      - 'examples/**'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-run-commands.yml@01e2b12e992621fecf074b8a202f66044196f3bf
    with:
      working-directory: "."
      setup-go: true
      go-version: "1.25.8"
      timeout-minutes: 15
      commands: |-
        set -euo pipefail
        go run ./cmd/build-static -website-root ./examples/hello-world -out /tmp/dist
        test -f /tmp/dist/index.html
      artifact-name: "built-site"
      artifact-path: "/tmp/dist"
