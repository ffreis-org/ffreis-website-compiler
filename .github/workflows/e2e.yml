name: E2E Build Smoke

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '**'
      - 'examples/**'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - '**'
      - 'examples/**'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    if: ${{ !github.event.pull_request.draft }}
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-run-commands.yml@5dfbb4986ceb88f6518fa719da3a255294cf03cf
    with:
      working-directory: "."
      setup-go: true
      go-version: "1.25.8"
      timeout-minutes: 15
      commands: |-
        set -euo pipefail
        go run ./cmd/build-static -website-root ./examples/hello-world -out /tmp/dist
        test -f /tmp/dist/index.html
      artifact-name: "built-site"
      artifact-path: "/tmp/dist"
