name: Lefthook

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lefthook:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-lefthook.yml@01e2b12e992621fecf074b8a202f66044196f3bf
    with:
      working-directory: "."
      go-version: "1.25.8"
      lefthook-bootstrap-command: "make lefthook-bootstrap"
      lefthook-bin: ".bin/lefthook"
