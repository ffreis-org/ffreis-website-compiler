name: Build All (Go Matrix)

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - '**'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-cross-build-matrix.yml@a543ef895b5c2d6e4e7fe87245d440889c485b7c
    with:
      go-version: "1.25.8"
      working-directory: "."
      targets: |-
        ./cmd/build-static
        ./cmd/web
