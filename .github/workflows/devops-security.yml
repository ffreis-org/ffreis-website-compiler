name: DevOps / Security

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, master]
  schedule:
    - cron: "48 17 14 * *"  # monthly scattered (was: 0 6 * * 1)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    # Skip heavy vuln scanners (trivy/grype/osv) on docs-only changes.
    # gitleaks still runs on everything — secrets can hide in markdown too.
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '!**/*.md'
              - '!docs/**'

  gitleaks:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-gitleaks.yml@d9792d01b442d7f2d3d2c6855cb312d885594e0f # v1.2.1
    with:
      working-directory: "."
      scan-history: true
      upload-sarif: false

  codeql:
    if: ${{ github.event_name != 'pull_request' }}
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@d9792d01b442d7f2d3d2c6855cb312d885594e0f # v1.2.1
    with:
      languages: "go"
      source-root: "."

  govulncheck:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-security.yml@d9b0146bb491bf06a79c9c6289034537522cbed3
    with:
      go-version: "1.25.8"
      working-directory: "."

  semgrep:
    permissions:
      contents: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-semgrep-sarif.yml@d9b0146bb491bf06a79c9c6289034537522cbed3
    with:
      working-directory: "."
      upload-sarif: false

  trivy-fs:
    needs: changes
    if: |
      always() && (
        needs.changes.result == 'skipped' ||
        needs.changes.outputs.code == 'true'
      )
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scan-trivy-fs.yml@d9792d01b442d7f2d3d2c6855cb312d885594e0f # v1.2.1
    with:
      scan-ref: "."
      upload-sarif: false

  grype-fs:
    needs: changes
    if: |
      always() && (
        needs.changes.result == 'skipped' ||
        needs.changes.outputs.code == 'true'
      )
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scan-grype-fs.yml@d9792d01b442d7f2d3d2c6855cb312d885594e0f # v1.2.1
    with:
      path: "."
      upload-sarif: false

  osv:
    needs: changes
    if: |
      always() && (
        needs.changes.result == 'skipped' ||
        needs.changes.outputs.code == 'true'
      )
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-osv-scanner.yml@5dfbb4986ceb88f6518fa719da3a255294cf03cf
    with:
      working-directory: "."
      upload-sarif: false

  lint:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-lint.yml@d9b0146bb491bf06a79c9c6289034537522cbed3
    with:
      go-version: "1.25.8"
      working-directory: "."

  snyk:
    if: false
    permissions:
      contents: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-snyk.yml@d9b0146bb491bf06a79c9c6289034537522cbed3
    with:
      working-directory: "."
      upload-sarif: false
