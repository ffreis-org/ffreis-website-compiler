name: DevOps / Security

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, master]
  schedule:
    - cron: "48 17 14 * *"  # monthly scattered (was: 0 6 * * 1)
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    # Skip heavy vuln scanners (trivy/grype/osv) on docs-only changes.
    # gitleaks still runs on everything — secrets can hide in markdown too.
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '!**/*.md'
              - '!docs/**'

  security-fs:
    needs: changes
    if: |
      always() && (
        needs.changes.result == 'skipped' ||
        needs.changes.outputs.code == 'true'
      )
    permissions:
      contents: read
      actions: read
      security-events: write
    # Consolidated fs-security bundle: Trivy(fs) + Grype(fs) + gitleaks in ONE job
    # (was 3 separate jobs). upload-sarif off: GHAS/code-scanning not enabled.
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-security-fs.yml@ce7169b36bd25b1c4c0c8077aa78ecde6d6ca7d5  # v1.6.0
    with:
      working-directory: "."
      scan-history: true
      upload-sarif: false
      runner: ${{ (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && '["ubuntu-latest"]' || '["self-hosted","spot","linux","x64"]' }}
  codeql:
    if: ${{ github.event_name != 'pull_request' }}
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@ce7169b36bd25b1c4c0c8077aa78ecde6d6ca7d5  # v1.6.0
    with:
      languages: "go"
      source-root: "."

      runner: ${{ (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && '["ubuntu-latest"]' || '["self-hosted","spot","linux","x64"]' }}
  govulncheck:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-security.yml@d9b0146bb491bf06a79c9c6289034537522cbed3
    with:
      go-version: "1.25.8"
      working-directory: "."

      runner: ${{ (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && '["ubuntu-latest"]' || '["self-hosted","spot","linux","x64"]' }}
  semgrep:
    permissions:
      contents: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-semgrep-sarif.yml@d9b0146bb491bf06a79c9c6289034537522cbed3
    with:
      working-directory: "."
      upload-sarif: false

      runner: ${{ (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && '["ubuntu-latest"]' || '["self-hosted","spot","linux","x64"]' }}
  osv:
    needs: changes
    if: |
      (vars.FLEET_SPOT_CI != 'true' || github.event_name == 'workflow_dispatch') &&
      always() && (
        needs.changes.result == 'skipped' ||
        needs.changes.outputs.code == 'true'
      )
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-osv-scanner.yml@ce7169b36bd25b1c4c0c8077aa78ecde6d6ca7d5  # v1.6.0
    with:
      working-directory: "."
      upload-sarif: false

      runner: ${{ (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && '["ubuntu-latest"]' || '["self-hosted","spot","linux","x64"]' }}
  lint:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-lint.yml@d9b0146bb491bf06a79c9c6289034537522cbed3
    with:
      go-version: "1.25.8"
      working-directory: "."

      runner: ${{ (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && '["ubuntu-latest"]' || '["self-hosted","spot","linux","x64"]' }}
  snyk:
    if: false
    permissions:
      contents: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-snyk.yml@d9b0146bb491bf06a79c9c6289034537522cbed3
    with:
      working-directory: "."
      upload-sarif: false
      runner: ${{ (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && '["ubuntu-latest"]' || '["self-hosted","spot","linux","x64"]' }}
