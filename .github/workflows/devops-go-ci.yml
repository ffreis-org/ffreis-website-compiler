name: DevOps / Go CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - ".github/workflows/**"
  push:
    branches: [main, master]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mod-tidy:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-mod-tidy-check.yml@d9b0146bb491bf06a79c9c6289034537522cbed3
    with:
      go-version: "1.25.8"
      working-directory: "."

  fmt:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-fmt.yml@d9b0146bb491bf06a79c9c6289034537522cbed3
    with:
      go-version: "1.25.8"
      working-directory: "."

  lint:
    needs: [fmt]
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-lint.yml@d9b0146bb491bf06a79c9c6289034537522cbed3
    with:
      go-version: "1.25.8"
      working-directory: "."

  test:
    if: ${{ !github.event.pull_request.draft }}
    needs: [fmt]
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-test.yml@d9b0146bb491bf06a79c9c6289034537522cbed3
    with:
      go-version: "1.25.8"
      working-directory: "."
      run-govulncheck: false

  integration:
    if: ${{ !github.event.pull_request.draft }}
    needs: [fmt]
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-test.yml@d9b0146bb491bf06a79c9c6289034537522cbed3
    with:
      go-version: "1.25.8"
      working-directory: "."
      test-tags: "integration"
      run-govulncheck: false
