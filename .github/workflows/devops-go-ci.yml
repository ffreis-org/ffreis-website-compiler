name: DevOps / Go CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - ".github/workflows/**"
  push:
    branches: [main, master]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-checks:
    permissions:
      contents: read
      pull-requests: read # for golangci-lint-action
    uses: ffreis-org/ffreis-workflows-go/.github/workflows/go-quick-checks.yml@03a0f49a676450744ed730b674c9194d353a4ad2 # post-v1.1.2
    with:
      go-version: "1.25.8"
      working-directory: "."

  test:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    needs: [quick-checks]
    permissions:
      contents: read
    uses: ffreis-org/ffreis-workflows-go/.github/workflows/go-test.yml@03a0f49a676450744ed730b674c9194d353a4ad2 # post-v1.1.2
    with:
      go-version: "1.25.8"
      working-directory: "."
      run-govulncheck: false

  integration:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    needs: [quick-checks]
    permissions:
      contents: read
    uses: ffreis-org/ffreis-workflows-go/.github/workflows/go-test.yml@03a0f49a676450744ed730b674c9194d353a4ad2 # post-v1.1.2
    with:
      go-version: "1.25.8"
      working-directory: "."
      test-tags: "integration"
      run-govulncheck: false
