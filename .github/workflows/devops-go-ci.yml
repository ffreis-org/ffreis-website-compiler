name: DevOps / Go CI

on:
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - ".github/workflows/**"
  push:
    branches: [main, master]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - ".github/workflows/**"

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mod-tidy:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-mod-tidy-check.yml@a543ef895b5c2d6e4e7fe87245d440889c485b7c
    with:
      go-version: "1.25.8"
      working-directory: "."

  fmt:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-fmt.yml@a543ef895b5c2d6e4e7fe87245d440889c485b7c
    with:
      go-version: "1.25.8"
      working-directory: "."

  lint:
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-lint.yml@a543ef895b5c2d6e4e7fe87245d440889c485b7c
    with:
      go-version: "1.25.8"
      working-directory: "."

  test:
    if: ${{ !github.event.pull_request.draft }}
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-test.yml@a543ef895b5c2d6e4e7fe87245d440889c485b7c
    with:
      go-version: "1.25.8"
      working-directory: "."
      run-govulncheck: false

  integration:
    if: ${{ !github.event.pull_request.draft }}
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-test.yml@a543ef895b5c2d6e4e7fe87245d440889c485b7c
    with:
      go-version: "1.25.8"
      working-directory: "."
      test-tags: "integration"
      run-govulncheck: false
