name: CodeQL

on:
  schedule:
    - cron: "2 3 28 * *"  # monthly scattered (was: 0 0 * * 1)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@d9792d01b442d7f2d3d2c6855cb312d885594e0f # v1.2.1
    with:
      languages: "go"
