title = "gitleaks config"

# Extend the built-in ruleset — catches AWS keys, GitHub tokens, private keys,
# API keys, and hundreds of other known patterns out of the box.
[extend]
useDefault = true

# ── Additional rules ──────────────────────────────────────────────────────────

# Real AWS account IDs embedded in ARN strings.
# Informational severity — ARNs identify infrastructure but are not credentials.
[[rules]]
id          = "aws-account-id-in-arn"
description = "AWS Account ID embedded in an ARN"
regex       = 'arn:aws:[a-z0-9\-]+:[a-z0-9\-]*:(\d{12}):'
tags        = ["aws", "arn", "account-id"]
severity    = "info"

  [rules.allowlist]
  description = "Well-known placeholder account IDs used in documentation"
  regexes = [
    'arn:aws:[a-z0-9\-]+:[a-z0-9\-]*:123456789012:',
    'arn:aws:[a-z0-9\-]+:[a-z0-9\-]*:000000000000:',
    'arn:aws:[a-z0-9\-]+:[a-z0-9\-]*:111111111111:',
    'arn:aws:[a-z0-9\-]+:[a-z0-9\-]*:999999999999:',
  ]

# ── Global allowlist ──────────────────────────────────────────────────────────
#
# Gitleaks v7 expects a single [allowlist] table (map). The v8 [[allowlist]]
# multi-table form decodes as "expected a map, got slice" under the
# currently-installed binary. Merged into one table; per-group reasoning is
# retained in inline comments.

[allowlist]
description = "Global allowlist: placeholders, doc files, lock files, test fixtures, generated code"
regexes = [
  # Template placeholders — not real secrets
  'YOUR_[A-Z_]+',
  'REPLACE_ME',
  '<[A-Z_]+>',
  'example\.com',
  # Well-known documentation placeholder account IDs
  '123456789012',
  '000000000000',
  '111111111111',
  '999999999999',
]
paths = [
  # Test and fixture files — may contain example-like values by design
  '.*_test\.go$',
  '.*_test\.py$',
  '.*test_.*\.py$',
  'tests?/.*',
  '.*fixtures?/.*',
  '.*testdata/.*',
  '.*examples?/.*',
  '.*\.example$',
  '.*\.sample$',
  # Documentation — prose naturally contains example-like patterns
  '.*\.md$',
  '.*\.txt$',
  '.*\.rst$',
  'docs/.*',
  # Dependency lock files — hashes are not secrets
  'uv\.lock',
  'poetry\.lock',
  'Cargo\.lock',
  'go\.sum',
  'package-lock\.json',
  'yarn\.lock',
  'Pipfile\.lock',
  # Generated protobuf files — binary encoding artifacts
  '.*_pb2\.py$',
  '.*_pb2_grpc\.py$',
  '.*\.pb\.go$',
  '.*\.pb\.rs$',
]
